<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030810"/>
      <stop offset="40%" stop-color="#050C18"/>
      <stop offset="100%" stop-color="#020508"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#0A3060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A3060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#1A4A2A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A4A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stars" cx="50%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#4A80C0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4A80C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="540" cy="576" rx="650" ry="500" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="540" cy="1536" rx="650" ry="520" fill="url(#g2)" filter="url(#blur)"/>
  <ellipse cx="540" cy="288" rx="500" ry="350" fill="url(#stars)" filter="url(#blur)"/>

  <!-- Mountain silhouettes -->
  <g fill="#0A1A0A" opacity="0.6">
    <!-- Back mountains -->
    <polygon points="-50,1920 200,1100 450,1920"/>
    <polygon points="150,1920 450,1000 750,1920"/>
    <polygon points="400,1920 700,1050 1000,1920"/>
    <polygon points="650,1920 950,1100 1130,1920"/>
    <!-- Front mountains darker -->
    <polygon points="-50,1920 150,1300 350,1920" opacity="0.8"/>
    <polygon points="250,1920 500,1200 750,1920" opacity="0.8"/>
    <polygon points="600,1920 850,1250 1130,1920" opacity="0.8"/>
  </g>

  <!-- Snow caps on peaks -->
  <g fill="white" opacity="0.06">
    <polygon points="200,1100 225,1150 175,1150"/>
    <polygon points="450,1000 480,1060 420,1060"/>
    <polygon points="700,1050 730,1110 670,1110"/>
    <polygon points="950,1100 975,1155 925,1155"/>
  </g>

  <!-- Star field top -->
  <g fill="white">
    <circle cx="100" cy="100" r="1.5" opacity="0.6"/>
    <circle cx="250" cy="60" r="1" opacity="0.5"/>
    <circle cx="420" cy="140" r="1.5" opacity="0.55"/>
    <circle cx="600" cy="80" r="2" opacity="0.6"/>
    <circle cx="780" cy="120" r="1" opacity="0.5"/>
    <circle cx="950" cy="90" r="1.5" opacity="0.55"/>
    <circle cx="80" cy="280" r="1" opacity="0.4"/>
    <circle cx="340" cy="240" r="1.5" opacity="0.45"/>
    <circle cx="660" cy="260" r="1" opacity="0.4"/>
    <circle cx="880" cy="300" r="1.5" opacity="0.45"/>
    <circle cx="1040" cy="200" r="1" opacity="0.4"/>
    <circle cx="170" cy="400" r="1.5" opacity="0.35"/>
    <circle cx="500" cy="380" r="1" opacity="0.35"/>
    <circle cx="820" cy="440" r="1.5" opacity="0.35"/>
    <circle cx="50" cy="550" r="1" opacity="0.3"/>
    <circle cx="1000" cy="500" r="1.5" opacity="0.3"/>
  </g>

  <!-- Compass rose hint -->
  <g transform="translate(540,650)" fill="none" stroke="#4A80C0" opacity="0.12">
    <circle cx="0" cy="0" r="120"/>
    <circle cx="0" cy="0" r="80"/>
    <circle cx="0" cy="0" r="30"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke-width="1"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke-width="1"/>
    <line x1="-85" y1="-85" x2="85" y2="85" stroke-width="0.8"/>
    <line x1="85" y1="-85" x2="-85" y2="85" stroke-width="0.8"/>
    <!-- North arrow -->
    <polygon points="0,-120 8,-60 0,-80 -8,-60" fill="#4A80C0" opacity="0.3"/>
  </g>

  <!-- Altitude lines -->
  <g stroke="#1A4A2A" stroke-width="1" fill="none" opacity="0.15">
    <path d="M 0,1200 Q 270,1180 540,1200 Q 810,1220 1080,1200"/>
    <path d="M 0,1250 Q 270,1230 540,1250 Q 810,1270 1080,1250"/>
    <path d="M 0,1300 Q 270,1280 540,1300 Q 810,1320 1080,1300"/>
  </g>

  <!-- Blue/green sparkles -->
  <g>
    <circle cx="200" cy="200" r="2" fill="#4A80C0" opacity="0.4"/>
    <circle cx="880" cy="180" r="2.5" fill="#4A80C0" opacity="0.35"/>
    <circle cx="150" cy="700" r="2" fill="#4A9E4A" opacity="0.35"/>
    <circle cx="930" cy="650" r="2.5" fill="#4A9E4A" opacity="0.35"/>
    <circle cx="350" cy="1600" r="2" fill="#4A9E4A" opacity="0.3"/>
    <circle cx="750" cy="1700" r="2.5" fill="#4A9E4A" opacity="0.3"/>
  </g>

  <defs>
    <linearGradient id="outdoorline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A3060" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4A80C0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A3060" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="3" fill="url(#outdoorline)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#outdoorline)"/>
</svg>
