<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="40%" stop-color="#111D35"/>
      <stop offset="100%" stop-color="#080D18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2A5298" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2A5298" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="324" cy="768" rx="500" ry="400" fill="url(#glow1)" filter="url(#blur)"/>
  <ellipse cx="810" cy="1248" rx="430" ry="380" fill="url(#glow2)" filter="url(#blur)"/>

  <!-- Diagonal light beam -->
  <g opacity="0.05">
    <polygon points="0,0 400,0 1080,1920 0,1920" fill="#2A5298"/>
  </g>

  <!-- Grid of subtle dots -->
  <g fill="#C9A96E" opacity="0.15">
    <g>
      <circle cx="108" cy="192" r="1.5"/>
      <circle cx="216" cy="192" r="1"/>
      <circle cx="324" cy="192" r="1.5"/>
      <circle cx="432" cy="192" r="1"/>
      <circle cx="540" cy="192" r="2"/>
      <circle cx="648" cy="192" r="1"/>
      <circle cx="756" cy="192" r="1.5"/>
      <circle cx="864" cy="192" r="1"/>
      <circle cx="972" cy="192" r="1.5"/>
    </g>
    <g opacity="0.5">
      <circle cx="108" cy="384" r="1"/>
      <circle cx="324" cy="384" r="1.5"/>
      <circle cx="540" cy="384" r="1"/>
      <circle cx="756" cy="384" r="1.5"/>
      <circle cx="972" cy="384" r="1"/>
    </g>
  </g>

  <!-- Large decorative cross/plus shapes -->
  <g stroke="#C9A96E" stroke-width="1" fill="none" opacity="0.1">
    <line x1="540" y1="600" x2="540" y2="900"/>
    <line x1="390" y1="750" x2="690" y2="750"/>
    <circle cx="540" cy="750" r="80"/>
    <circle cx="540" cy="750" r="140"/>
  </g>

  <!-- Floating particles -->
  <g fill="#C9A96E">
    <circle cx="180" cy="480" r="3" opacity="0.4"/>
    <circle cx="900" cy="360" r="2" opacity="0.3"/>
    <circle cx="720" cy="1080" r="3" opacity="0.35"/>
    <circle cx="160" cy="1320" r="2" opacity="0.3"/>
    <circle cx="950" cy="1440" r="3" opacity="0.4"/>
    <circle cx="420" cy="1680" r="2" opacity="0.25"/>
  </g>

  <!-- Horizontal rule lines -->
  <defs>
    <linearGradient id="hline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C9A96E" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#C9A96E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topbot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A96E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="1580" width="1080" height="1" fill="url(#hline)"/>
  <rect x="0" y="1590" width="1080" height="1" fill="url(#hline)" opacity="0.4"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#topbot)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#topbot)"/>

  <!-- Corner marks -->
</svg>
