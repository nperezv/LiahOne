<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="35%" stop-color="#2D0A0A"/>
      <stop offset="70%" stop-color="#0A1A0A"/>
      <stop offset="100%" stop-color="#060E06"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#1B4D1B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1B4D1B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starglow" cx="50%" cy="35%" r="20%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="540" cy="384" rx="600" ry="450" fill="url(#glow1)" filter="url(#blur)"/>
  <ellipse cx="540" cy="1536" rx="600" ry="450" fill="url(#glow2)" filter="url(#blur)"/>
  <ellipse cx="540" cy="672" rx="300" ry="250" fill="url(#starglow)" filter="url(#blur)"/>

  <!-- Pine trees silhouette left -->
  <g fill="#0D2E0D" opacity="0.5">
    <polygon points="-20,1920 80,1920 30,1600"/>
    <polygon points="-10,1750 90,1750 40,1480"/>
    <polygon points="0,1600 100,1600 50,1360"/>
    <polygon points="60,1920 180,1920 120,1650"/>
    <polygon points="70,1760 190,1760 130,1520"/>
  </g>

  <!-- Pine trees silhouette right -->
  <g fill="#0D2E0D" opacity="0.5">
    <polygon points="1000,1920 1100,1920 1050,1600"/>
    <polygon points="990,1750 1110,1750 1050,1480"/>
    <polygon points="980,1600 1100,1600 1040,1360"/>
    <polygon points="920,1920 1060,1920 990,1650"/>
    <polygon points="930,1760 1070,1760 1000,1520"/>
  </g>

  <!-- Christmas star center -->
  <g filter="url(#glow)" opacity="0.9">
    <polygon points="540,580 555,625 602,625 566,652 580,697 540,672 500,697 514,652 478,625 525,625" fill="#FFD700" opacity="0.85"/>
    <!-- Star rays -->
    <line x1="540" y1="520" x2="540" y2="560" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
    <line x1="540" y1="700" x2="540" y2="740" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
    <line x1="460" y1="638" x2="500" y2="638" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
    <line x1="580" y1="638" x2="620" y2="638" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
    <line x1="483" y1="563" x2="510" y2="590" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
    <line x1="597" y1="563" x2="570" y2="590" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
    <line x1="483" y1="713" x2="510" y2="686" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
    <line x1="597" y1="713" x2="570" y2="686" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Snowflakes -->
  <g fill="white" opacity="0.7">
    <!-- Large snowflakes -->
    <g transform="translate(150, 300)">
      <line x1="0" y1="-18" x2="0" y2="18" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="-13" y1="-13" x2="13" y2="13" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="13" y1="-13" x2="-13" y2="13" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <circle cx="0" cy="0" r="3" fill="white" opacity="0.8"/>
    </g>
    <g transform="translate(900, 450)">
      <line x1="0" y1="-15" x2="0" y2="15" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="-11" y1="-11" x2="11" y2="11" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="11" y1="-11" x2="-11" y2="11" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <circle cx="0" cy="0" r="2.5" fill="white" opacity="0.8"/>
    </g>
    <g transform="translate(250, 900)">
      <line x1="0" y1="-12" x2="0" y2="12" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="-12" y1="0" x2="12" y2="0" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="-9" y1="-9" x2="9" y2="9" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="9" y1="-9" x2="-9" y2="9" stroke="white" stroke-width="1" opacity="0.5"/>
    </g>
    <g transform="translate(830, 1100)">
      <line x1="0" y1="-12" x2="0" y2="12" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="-12" y1="0" x2="12" y2="0" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="-9" y1="-9" x2="9" y2="9" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="9" y1="-9" x2="-9" y2="9" stroke="white" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Small snow dots scattered -->
    <circle cx="80" cy="200" r="3" opacity="0.5"/>
    <circle cx="320" cy="150" r="2" opacity="0.4"/>
    <circle cx="600" cy="120" r="3" opacity="0.5"/>
    <circle cx="820" cy="280" r="2" opacity="0.4"/>
    <circle cx="1000" cy="160" r="3" opacity="0.5"/>
    <circle cx="180" cy="520" r="2" opacity="0.4"/>
    <circle cx="700" cy="400" r="3" opacity="0.5"/>
    <circle cx="960" cy="680" r="2" opacity="0.35"/>
    <circle cx="400" cy="1200" r="2" opacity="0.3"/>
    <circle cx="750" cy="1350" r="3" opacity="0.35"/>
    <circle cx="120" cy="1500" r="2" opacity="0.3"/>
    <circle cx="950" cy="1250" r="2" opacity="0.3"/>
  </g>

  <!-- Gold ornamental circles (baubles hint) -->
  <g fill="none" stroke="#C9A96E" opacity="0.2">
    <circle cx="200" cy="700" r="25" stroke-width="1.5"/>
    <circle cx="200" cy="700" r="18" stroke-width="1"/>
    <circle cx="880" cy="850" r="20" stroke-width="1.5"/>
    <circle cx="880" cy="850" r="13" stroke-width="1"/>
    <circle cx="140" cy="1100" r="15" stroke-width="1"/>
    <circle cx="940" cy="1200" r="22" stroke-width="1.5"/>
  </g>

  <!-- Red ornamental circles -->
  <g fill="none" stroke="#CC2200" opacity="0.25">
    <circle cx="920" cy="650" r="22" stroke-width="1.5"/>
    <circle cx="160" cy="900" r="18" stroke-width="1"/>
    <circle cx="980" cy="1050" r="15" stroke-width="1"/>
  </g>

  <!-- Snow ground at bottom -->
  <ellipse cx="540" cy="1920" rx="700" ry="100" fill="white" opacity="0.06"/>
  <ellipse cx="200" cy="1920" rx="300" ry="80" fill="white" opacity="0.04"/>
  <ellipse cx="900" cy="1920" rx="250" ry="70" fill="white" opacity="0.04"/>

  <!-- Border lines -->
  <defs>
    <linearGradient id="topbot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A96E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="3" fill="url(#topbot)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#topbot)"/>

  <!-- Corner ornaments -->
</svg>
