<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020A04"/>
      <stop offset="50%" stop-color="#050F06"/>
      <stop offset="100%" stop-color="#020804"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00CC44" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00CC44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#00FF66" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00FF66" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="540" cy="864" rx="620" ry="520" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="216" cy="1440" rx="460" ry="380" fill="url(#g2)" filter="url(#blur)"/>

  <!-- Circuit board pattern -->
  <g stroke="#00CC44" stroke-width="1" fill="none" opacity="0.1">
    <!-- Horizontal traces -->
    <line x1="0" y1="400" x2="300" y2="400"/>
    <line x1="300" y1="400" x2="300" y2="500"/>
    <line x1="300" y1="500" x2="600" y2="500"/>
    <line x1="600" y1="500" x2="600" y2="350"/>
    <line x1="600" y1="350" x2="900" y2="350"/>
    <line x1="900" y1="350" x2="900" y2="450"/>
    <line x1="900" y1="450" x2="1080" y2="450"/>

    <line x1="0" y1="700" x2="200" y2="700"/>
    <line x1="200" y1="700" x2="200" y2="800"/>
    <line x1="200" y1="800" x2="500" y2="800"/>
    <line x1="500" y1="800" x2="500" y2="650"/>
    <line x1="500" y1="650" x2="800" y2="650"/>
    <line x1="800" y1="650" x2="800" y2="750"/>
    <line x1="800" y1="750" x2="1080" y2="750"/>

    <line x1="0" y1="1100" x2="400" y2="1100"/>
    <line x1="400" y1="1100" x2="400" y2="1200"/>
    <line x1="400" y1="1200" x2="700" y2="1200"/>
    <line x1="700" y1="1200" x2="700" y2="1050"/>
    <line x1="700" y1="1050" x2="1080" y2="1050"/>

    <!-- Junction nodes -->
    <circle cx="300" cy="400" r="4"/>
    <circle cx="600" cy="500" r="4"/>
    <circle cx="900" cy="350" r="4"/>
    <circle cx="200" cy="700" r="4"/>
    <circle cx="500" cy="800" r="4"/>
    <circle cx="800" cy="650" r="4"/>
    <circle cx="400" cy="1100" r="4"/>
    <circle cx="700" cy="1200" r="4"/>
  </g>

  <!-- Central hexagon target -->
  <g transform="translate(540,900)" fill="none" opacity="0.15" filter="url(#glow)">
    <polygon points="0,-200 173,-100 173,100 0,200 -173,100 -173,-100" stroke="#00CC44" stroke-width="1.5"/>
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" stroke="#00FF66" stroke-width="1"/>
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke="#00CC44" stroke-width="1.5"/>
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" stroke="#00FF66" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#00CC44" opacity="0.3"/>
    <!-- Cross hair -->
    <line x1="0" y1="-200" x2="0" y2="-160" stroke="#00FF66" stroke-width="2"/>
    <line x1="0" y1="160" x2="0" y2="200" stroke="#00FF66" stroke-width="2"/>
    <line x1="-200" y1="0" x2="-160" y2="0" stroke="#00FF66" stroke-width="2"/>
    <line x1="160" y1="0" x2="200" y2="0" stroke="#00FF66" stroke-width="2"/>
  </g>

  <!-- Glowing dots -->
  <g fill="#00FF66" filter="url(#glow)">
    <circle cx="150" cy="300" r="3" opacity="0.5"/>
    <circle cx="900" cy="250" r="3" opacity="0.45"/>
    <circle cx="80" cy="1000" r="3" opacity="0.4"/>
    <circle cx="1000" cy="800" r="3" opacity="0.45"/>
    <circle cx="300" cy="1500" r="3" opacity="0.4"/>
    <circle cx="800" cy="1600" r="3" opacity="0.45"/>
    <circle cx="500" cy="1750" r="3" opacity="0.4"/>
  </g>

  <defs>
    <linearGradient id="greenline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CC44" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FF66" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00CC44" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="3" fill="url(#greenline)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#greenline)"/>

</svg>
