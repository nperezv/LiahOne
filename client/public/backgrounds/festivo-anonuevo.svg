<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050308"/>
      <stop offset="50%" stop-color="#0A0710"/>
      <stop offset="100%" stop-color="#030205"/>
    </linearGradient>
    <radialGradient id="g1" cx="30%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="324" cy="480" rx="450" ry="380" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="810" cy="672" rx="380" ry="320" fill="url(#g2)" filter="url(#blur)"/>
  <ellipse cx="540" cy="1344" rx="500" ry="420" fill="url(#g3)" filter="url(#blur)"/>

  <!-- Firework burst 1 - gold -->
  <g transform="translate(270,380)" filter="url(#glow)" opacity="0.7">
    <g stroke="#FFD700" stroke-width="1.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="-80"/>
      <line x1="0" y1="0" x2="76" y2="-28"/>
      <line x1="0" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="0" x2="76" y2="28"/>
      <line x1="0" y1="0" x2="57" y2="57"/>
      <line x1="0" y1="0" x2="28" y2="76"/>
      <line x1="0" y1="0" x2="0" y2="80"/>
      <line x1="0" y1="0" x2="-28" y2="76"/>
      <line x1="0" y1="0" x2="-57" y2="57"/>
      <line x1="0" y1="0" x2="-76" y2="28"/>
      <line x1="0" y1="0" x2="-80" y2="0"/>
      <line x1="0" y1="0" x2="-76" y2="-28"/>
      <line x1="0" y1="0" x2="-57" y2="-57"/>
      <line x1="0" y1="0" x2="-28" y2="-76"/>
    </g>
    <!-- Sparks at tips -->
    <g fill="#FFD700">
      <circle cx="0" cy="-80" r="3"/>
      <circle cx="76" cy="-28" r="2.5"/>
      <circle cx="80" cy="0" r="3"/>
      <circle cx="57" cy="57" r="2.5"/>
      <circle cx="0" cy="80" r="3"/>
      <circle cx="-57" cy="57" r="2.5"/>
      <circle cx="-80" cy="0" r="3"/>
      <circle cx="-57" cy="-57" r="2.5"/>
    </g>
    <circle cx="0" cy="0" r="6" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Firework burst 2 - red/orange -->
  <g transform="translate(810,500)" filter="url(#glow)" opacity="0.6">
    <g stroke="#FF6600" stroke-width="1.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="-70"/>
      <line x1="0" y1="0" x2="66" y2="-25"/>
      <line x1="0" y1="0" x2="70" y2="0"/>
      <line x1="0" y1="0" x2="66" y2="25"/>
      <line x1="0" y1="0" x2="50" y2="50"/>
      <line x1="0" y1="0" x2="25" y2="66"/>
      <line x1="0" y1="0" x2="0" y2="70"/>
      <line x1="0" y1="0" x2="-25" y2="66"/>
      <line x1="0" y1="0" x2="-50" y2="50"/>
      <line x1="0" y1="0" x2="-66" y2="25"/>
      <line x1="0" y1="0" x2="-70" y2="0"/>
      <line x1="0" y1="0" x2="-50" y2="-50"/>
    </g>
    <g fill="#FF6600">
      <circle cx="0" cy="-70" r="2.5"/>
      <circle cx="70" cy="0" r="2.5"/>
      <circle cx="0" cy="70" r="2.5"/>
      <circle cx="-70" cy="0" r="2.5"/>
      <circle cx="50" cy="50" r="2"/>
      <circle cx="-50" cy="50" r="2"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="#FF6600" opacity="0.8"/>
  </g>

  <!-- Firework burst 3 - small silver -->
  <g transform="translate(160,700)" filter="url(#glow)" opacity="0.5">
    <g stroke="#E8D5A3" stroke-width="1" fill="none">
      <line x1="0" y1="0" x2="0" y2="-50"/>
      <line x1="0" y1="0" x2="47" y2="-16"/>
      <line x1="0" y1="0" x2="50" y2="0"/>
      <line x1="0" y1="0" x2="35" y2="35"/>
      <line x1="0" y1="0" x2="0" y2="50"/>
      <line x1="0" y1="0" x2="-35" y2="35"/>
      <line x1="0" y1="0" x2="-50" y2="0"/>
      <line x1="0" y1="0" x2="-35" y2="-35"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#E8D5A3" opacity="0.7"/>
  </g>

  <!-- Firework burst 4 -->
  <g transform="translate(920,300)" filter="url(#glow)" opacity="0.5">
    <g stroke="#FFD700" stroke-width="1" fill="none">
      <line x1="0" y1="0" x2="0" y2="-55"/>
      <line x1="0" y1="0" x2="55" y2="0"/>
      <line x1="0" y1="0" x2="39" y2="39"/>
      <line x1="0" y1="0" x2="0" y2="55"/>
      <line x1="0" y1="0" x2="-55" y2="0"/>
      <line x1="0" y1="0" x2="-39" y2="-39"/>
      <line x1="0" y1="0" x2="39" y2="-39"/>
      <line x1="0" y1="0" x2="-39" y2="39"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#FFD700" opacity="0.7"/>
  </g>

  <!-- Scattered sparks -->
  <g fill="#FFD700">
    <circle cx="200" cy="200" r="2" opacity="0.5"/>
    <circle cx="500" cy="150" r="1.5" opacity="0.4"/>
    <circle cx="700" cy="220" r="2" opacity="0.45"/>
    <circle cx="1000" cy="180" r="1.5" opacity="0.4"/>
    <circle cx="80" cy="600" r="2" opacity="0.35"/>
    <circle cx="950" cy="750" r="1.5" opacity="0.35"/>
    <circle cx="400" cy="1200" r="2" opacity="0.3"/>
    <circle cx="750" cy="1300" r="1.5" opacity="0.3"/>
    <circle cx="200" cy="1600" r="2" opacity="0.25"/>
    <circle cx="900" cy="1500" r="1.5" opacity="0.25"/>
    <circle cx="550" cy="1750" r="2" opacity="0.2"/>
  </g>

  <!-- Star dots scattered -->
  <g fill="white" opacity="0.4">
    <circle cx="350" cy="80" r="1.5"/>
    <circle cx="650" cy="120" r="1"/>
    <circle cx="900" cy="100" r="1.5"/>
    <circle cx="100" cy="350" r="1"/>
    <circle cx="980" cy="500" r="1.5"/>
    <circle cx="300" cy="900" r="1"/>
    <circle cx="800" cy="1000" r="1.5"/>
    <circle cx="100" cy="1400" r="1"/>
    <circle cx="1000" cy="1300" r="1.5"/>
  </g>

  <defs>
    <linearGradient id="topbot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="3" fill="url(#topbot)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#topbot)"/>
</svg>
