<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030810"/>
      <stop offset="50%" stop-color="#060D1A"/>
      <stop offset="100%" stop-color="#030810"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#0A2A6E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A2A6E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#0D3580" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D3580" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starglow" cx="50%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="540" cy="672" rx="620" ry="500" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="540" cy="1440" rx="580" ry="480" fill="url(#g2)" filter="url(#blur)"/>
  <ellipse cx="540" cy="576" rx="300" ry="250" fill="url(#starglow)" filter="url(#blur)"/>

  <!-- Dense star field -->
  <g fill="white">
    <circle cx="80" cy="120" r="1.5" opacity="0.6"/>
    <circle cx="200" cy="80" r="1" opacity="0.5"/>
    <circle cx="340" cy="150" r="1.5" opacity="0.55"/>
    <circle cx="480" cy="60" r="1" opacity="0.45"/>
    <circle cx="620" cy="130" r="2" opacity="0.6"/>
    <circle cx="760" cy="90" r="1" opacity="0.5"/>
    <circle cx="900" cy="160" r="1.5" opacity="0.55"/>
    <circle cx="1020" cy="70" r="1" opacity="0.45"/>
    <circle cx="140" cy="250" r="1" opacity="0.4"/>
    <circle cx="420" cy="220" r="1.5" opacity="0.5"/>
    <circle cx="660" cy="280" r="1" opacity="0.45"/>
    <circle cx="870" cy="240" r="1.5" opacity="0.5"/>
    <circle cx="50" cy="380" r="1.5" opacity="0.4"/>
    <circle cx="290" cy="320" r="1" opacity="0.4"/>
    <circle cx="540" cy="360" r="1.5" opacity="0.45"/>
    <circle cx="780" cy="400" r="1" opacity="0.4"/>
    <circle cx="1000" cy="340" r="1.5" opacity="0.45"/>
    <circle cx="160" cy="480" r="1" opacity="0.35"/>
    <circle cx="700" cy="500" r="1.5" opacity="0.4"/>
    <circle cx="950" cy="460" r="1" opacity="0.35"/>
    <!-- Scattered through image -->
    <circle cx="100" cy="700" r="1" opacity="0.3"/>
    <circle cx="980" cy="750" r="1.5" opacity="0.3"/>
    <circle cx="60" cy="1100" r="1" opacity="0.25"/>
    <circle cx="1010" cy="1200" r="1.5" opacity="0.25"/>
    <circle cx="200" cy="1600" r="1" opacity="0.2"/>
    <circle cx="900" cy="1700" r="1.5" opacity="0.2"/>
  </g>

  <!-- Bright star center with rays -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="540" cy="580" r="4" fill="white" opacity="0.9"/>
    <line x1="540" y1="545" x2="540" y2="560" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="540" y1="600" x2="540" y2="615" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="505" y1="580" x2="520" y2="580" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="560" y1="580" x2="575" y2="580" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="515" y1="555" x2="525" y2="565" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="555" y1="555" x2="565" y2="545" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="515" y1="605" x2="525" y2="595" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="555" y1="605" x2="565" y2="615" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Concentric light rings -->
  <g transform="translate(540,700)" fill="none">
    <circle cx="0" cy="0" r="320" stroke="white" stroke-width="0.5" opacity="0.06"/>
    <circle cx="0" cy="0" r="260" stroke="#4A90D9" stroke-width="0.8" opacity="0.1"/>
    <circle cx="0" cy="0" r="200" stroke="white" stroke-width="1" opacity="0.1"/>
    <circle cx="0" cy="0" r="140" stroke="#4A90D9" stroke-width="1" opacity="0.14"/>
    <circle cx="0" cy="0" r="80" stroke="white" stroke-width="1.5" opacity="0.18"/>
    <circle cx="0" cy="0" r="30" fill="white" opacity="0.04"/>
  </g>

  <!-- Classical column-like vertical lines -->
  <g stroke="white" stroke-width="0.5" opacity="0.06">
    <line x1="120" y1="0" x2="120" y2="1920"/>
    <line x1="240" y1="0" x2="240" y2="1920"/>
    <line x1="360" y1="0" x2="360" y2="1920"/>
    <line x1="480" y1="0" x2="480" y2="1920"/>
    <line x1="600" y1="0" x2="600" y2="1920"/>
    <line x1="720" y1="0" x2="720" y2="1920"/>
    <line x1="840" y1="0" x2="840" y2="1920"/>
    <line x1="960" y1="0" x2="960" y2="1920"/>
  </g>

  <!-- Horizontal bands of light -->
  <defs>
    <linearGradient id="hband" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4A90D9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topbot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="1500" width="1080" height="60" fill="url(#hband)"/>
  <rect x="0" y="0" width="1080" height="3" fill="url(#topbot)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#topbot)"/>

</svg>
