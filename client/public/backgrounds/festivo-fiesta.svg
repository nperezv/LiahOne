<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0A18"/>
      <stop offset="50%" stop-color="#180A20"/>
      <stop offset="100%" stop-color="#0A0F18"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#FFE66D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFE66D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="80%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="540" cy="768" rx="600" ry="500" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="216" cy="1344" rx="450" ry="400" fill="url(#g2)" filter="url(#blur)"/>
  <ellipse cx="864" cy="1152" rx="430" ry="380" fill="url(#g3)" filter="url(#blur)"/>

  <!-- Festive banner triangles top -->
  <g opacity="0.35">
    <polygon points="0,0 120,0 60,90" fill="#FF6B6B"/>
    <polygon points="120,0 240,0 180,90" fill="#FFE66D"/>
    <polygon points="240,0 360,0 300,90" fill="#4ECDC4"/>
    <polygon points="360,0 480,0 420,90" fill="#FF6B6B"/>
    <polygon points="480,0 600,0 540,90" fill="#FFE66D"/>
    <polygon points="600,0 720,0 660,90" fill="#4ECDC4"/>
    <polygon points="720,0 840,0 780,90" fill="#FF6B6B"/>
    <polygon points="840,0 960,0 900,90" fill="#FFE66D"/>
    <polygon points="960,0 1080,0 1020,90" fill="#4ECDC4"/>
  </g>

  <!-- Banner triangles bottom -->
  <g opacity="0.35">
    <polygon points="0,1920 120,1920 60,1830" fill="#4ECDC4"/>
    <polygon points="120,1920 240,1920 180,1830" fill="#FFE66D"/>
    <polygon points="240,1920 360,1920 300,1830" fill="#FF6B6B"/>
    <polygon points="360,1920 480,1920 420,1830" fill="#4ECDC4"/>
    <polygon points="480,1920 600,1920 540,1830" fill="#FFE66D"/>
    <polygon points="600,1920 720,1920 660,1830" fill="#FF6B6B"/>
    <polygon points="720,1920 840,1920 780,1830" fill="#4ECDC4"/>
    <polygon points="840,1920 960,1920 900,1830" fill="#FFE66D"/>
    <polygon points="960,1920 1080,1920 1020,1830" fill="#FF6B6B"/>
  </g>

  <!-- Burst/star shapes -->
  <g opacity="0.15">
    <g transform="translate(200,600)">
      <polygon points="0,-60 14,-14 60,0 14,14 0,60 -14,14 -60,0 -14,-14" fill="#FFE66D"/>
    </g>
    <g transform="translate(880,400)">
      <polygon points="0,-50 12,-12 50,0 12,12 0,50 -12,12 -50,0 -12,-12" fill="#FF6B6B"/>
    </g>
    <g transform="translate(150,1300)">
      <polygon points="0,-45 10,-10 45,0 10,10 0,45 -10,10 -45,0 -10,-10" fill="#4ECDC4"/>
    </g>
    <g transform="translate(930,1500)">
      <polygon points="0,-50 12,-12 50,0 12,12 0,50 -12,12 -50,0 -12,-12" fill="#FFE66D"/>
    </g>
  </g>

  <!-- Scattered dots -->
  <g>
    <circle cx="300" cy="200" r="4" fill="#FF6B6B" opacity="0.4"/>
    <circle cx="750" cy="150" r="3" fill="#FFE66D" opacity="0.4"/>
    <circle cx="1000" cy="350" r="4" fill="#4ECDC4" opacity="0.35"/>
    <circle cx="80" cy="500" r="3" fill="#FFE66D" opacity="0.4"/>
    <circle cx="600" cy="300" r="4" fill="#FF6B6B" opacity="0.35"/>
    <circle cx="350" cy="1100" r="3" fill="#4ECDC4" opacity="0.35"/>
    <circle cx="800" cy="1300" r="4" fill="#FFE66D" opacity="0.4"/>
    <circle cx="120" cy="1700" r="3" fill="#FF6B6B" opacity="0.35"/>
    <circle cx="950" cy="1650" r="4" fill="#4ECDC4" opacity="0.4"/>
    <circle cx="500" cy="1800" r="3" fill="#FFE66D" opacity="0.35"/>
  </g>

  <!-- Central rings -->
  <g transform="translate(540,900)" fill="none" opacity="0.1">
    <circle cx="0" cy="0" r="250" stroke="#FF6B6B" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="200" stroke="#FFE66D" stroke-width="1"/>
    <circle cx="0" cy="0" r="150" stroke="#4ECDC4" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="100" stroke="#FF6B6B" stroke-width="1"/>
  </g>

  <!-- Side lines decoration -->
  <g stroke="#FFE66D" stroke-width="1" opacity="0.12">
    <line x1="30" y1="100" x2="30" y2="1820"/>
    <line x1="1050" y1="100" x2="1050" y2="1820"/>
  </g>

</svg>
