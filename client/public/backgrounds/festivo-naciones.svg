<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A18"/>
      <stop offset="100%" stop-color="#100A14"/>
    </linearGradient>
    <radialGradient id="r1" cx="20%" cy="30%" r="35%"><stop offset="0%" stop-color="#E63946" stop-opacity="0.3"/><stop offset="100%" stop-color="#E63946" stop-opacity="0"/></radialGradient>
    <radialGradient id="r2" cx="80%" cy="25%" r="30%"><stop offset="0%" stop-color="#F4A261" stop-opacity="0.25"/><stop offset="100%" stop-color="#F4A261" stop-opacity="0"/></radialGradient>
    <radialGradient id="r3" cx="50%" cy="60%" r="35%"><stop offset="0%" stop-color="#2A9D8F" stop-opacity="0.25"/><stop offset="100%" stop-color="#2A9D8F" stop-opacity="0"/></radialGradient>
    <radialGradient id="r4" cx="15%" cy="75%" r="30%"><stop offset="0%" stop-color="#E9C46A" stop-opacity="0.2"/><stop offset="100%" stop-color="#E9C46A" stop-opacity="0"/></radialGradient>
    <radialGradient id="r5" cx="85%" cy="70%" r="30%"><stop offset="0%" stop-color="#6A0572" stop-opacity="0.25"/><stop offset="100%" stop-color="#6A0572" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="216" cy="576" rx="450" ry="400" fill="url(#r1)" filter="url(#blur)"/>
  <ellipse cx="864" cy="480" rx="380" ry="350" fill="url(#r2)" filter="url(#blur)"/>
  <ellipse cx="540" cy="1152" rx="500" ry="450" fill="url(#r3)" filter="url(#blur)"/>
  <ellipse cx="162" cy="1440" rx="350" ry="300" fill="url(#r4)" filter="url(#blur)"/>
  <ellipse cx="918" cy="1344" rx="380" ry="330" fill="url(#r5)" filter="url(#blur)"/>

  <!-- Geometric confetti shapes -->
  <g opacity="0.4">
    <!-- Triangles -->
    <polygon points="120,200 150,260 90,260" fill="#E63946" opacity="0.6"/>
    <polygon points="950,350 980,410 920,410" fill="#F4A261" opacity="0.5"/>
    <polygon points="300,800 330,860 270,860" fill="#2A9D8F" opacity="0.5"/>
    <polygon points="800,1200 830,1260 770,1260" fill="#E9C46A" opacity="0.5"/>
    <polygon points="180,1500 210,1560 150,1560" fill="#6A0572" opacity="0.5"/>
    <polygon points="900,1700 930,1760 870,1760" fill="#E63946" opacity="0.4"/>

    <!-- Diamonds -->
    <rect x="700" y="150" width="20" height="20" fill="#E9C46A" opacity="0.5" transform="rotate(45 710 160)"/>
    <rect x="200" y="600" width="16" height="16" fill="#E63946" opacity="0.4" transform="rotate(45 208 608)"/>
    <rect x="850" y="900" width="18" height="18" fill="#2A9D8F" opacity="0.5" transform="rotate(45 859 909)"/>
    <rect x="400" y="1400" width="14" height="14" fill="#F4A261" opacity="0.4" transform="rotate(45 407 407)"/>
    <rect x="750" y="1600" width="16" height="16" fill="#6A0572" opacity="0.5" transform="rotate(45 758 1608)"/>

    <!-- Circles -->
    <circle cx="850" cy="200" r="12" fill="#2A9D8F" opacity="0.4"/>
    <circle cx="150" cy="1000" r="10" fill="#E9C46A" opacity="0.4"/>
    <circle cx="950" cy="1500" r="14" fill="#E63946" opacity="0.35"/>
    <circle cx="350" cy="1700" r="10" fill="#F4A261" opacity="0.4"/>
  </g>

  <!-- Circular mandala-like decoration center -->
  <g transform="translate(540,800)" stroke-width="1" fill="none" opacity="0.15">
    <circle cx="0" cy="0" r="200" stroke="#E63946"/>
    <circle cx="0" cy="0" r="180" stroke="#F4A261"/>
    <circle cx="0" cy="0" r="160" stroke="#E9C46A"/>
    <circle cx="0" cy="0" r="140" stroke="#2A9D8F"/>
    <circle cx="0" cy="0" r="120" stroke="#6A0572"/>
    <circle cx="0" cy="0" r="80" stroke="#E63946"/>
    <!-- Spokes -->
    <line x1="0" y1="-200" x2="0" y2="-120" stroke="#E9C46A" opacity="0.3"/>
    <line x1="0" y1="120" x2="0" y2="200" stroke="#E9C46A" opacity="0.3"/>
    <line x1="-200" y1="0" x2="-120" y2="0" stroke="#E9C46A" opacity="0.3"/>
    <line x1="120" y1="0" x2="200" y2="0" stroke="#E9C46A" opacity="0.3"/>
    <line x1="-141" y1="-141" x2="-85" y2="-85" stroke="#E9C46A" opacity="0.3"/>
    <line x1="85" y1="85" x2="141" y2="141" stroke="#E9C46A" opacity="0.3"/>
    <line x1="141" y1="-141" x2="85" y2="-85" stroke="#E9C46A" opacity="0.3"/>
    <line x1="-85" y1="85" x2="-141" y2="141" stroke="#E9C46A" opacity="0.3"/>
  </g>

  <!-- Scattered dots like confetti -->
  <g fill="white" opacity="0.3">
    <circle cx="200" cy="300" r="2"/>
    <circle cx="400" cy="180" r="1.5"/>
    <circle cx="700" cy="280" r="2"/>
    <circle cx="950" cy="600" r="1.5"/>
    <circle cx="100" cy="750" r="2"/>
    <circle cx="600" cy="500" r="1.5"/>
    <circle cx="880" cy="1100" r="2"/>
    <circle cx="300" cy="1300" r="1.5"/>
    <circle cx="750" cy="1450" r="2"/>
    <circle cx="500" cy="1650" r="1.5"/>
    <circle cx="900" cy="1800" r="2"/>
    <circle cx="200" cy="1750" r="1.5"/>
  </g>

  <!-- Border -->
  <defs>
    <linearGradient id="topbot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E9C46A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E9C46A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E9C46A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="3" fill="url(#topbot)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#topbot)"/>

</svg>
