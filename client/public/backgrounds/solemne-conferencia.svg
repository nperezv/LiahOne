<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040408"/>
      <stop offset="50%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#020206"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <ellipse cx="540" cy="768" rx="650" ry="550" fill="url(#g1)" filter="url(#blur)"/>
  <ellipse cx="540" cy="1440" rx="580" ry="460" fill="url(#g2)" filter="url(#blur)"/>

  <!-- Symmetrical pillar lines -->
  <g stroke="white" stroke-width="0.8" fill="none" opacity="0.06">
    <line x1="180" y1="0" x2="180" y2="1920"/>
    <line x1="900" y1="0" x2="900" y2="1920"/>
    <line x1="360" y1="0" x2="360" y2="1920"/>
    <line x1="720" y1="0" x2="720" y2="1920"/>
  </g>

  <!-- Horizontal bands -->
  <defs>
    <linearGradient id="hband" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="600" width="1080" height="2" fill="url(#hband)"/>
  <rect x="0" y="1300" width="1080" height="2" fill="url(#hband)"/>

  <!-- Central emblem - two overlapping rings (CTR style) -->
  <g transform="translate(540,780)" fill="none" filter="url(#glow)" opacity="0.15">
    <circle cx="-40" cy="0" r="100" stroke="white" stroke-width="2"/>
    <circle cx="40" cy="0" r="100" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" stroke="#C9A96E" stroke-width="1.5"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="200" stroke="white" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="260" stroke="#C9A96E" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Top ornamental arch -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.08">
    <path d="M 240,0 Q 240,200 540,200 Q 840,200 840,0"/>
    <path d="M 300,0 Q 300,160 540,160 Q 780,160 780,0"/>
  </g>

  <!-- Bottom ornamental arch -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.08">
    <path d="M 240,1920 Q 240,1720 540,1720 Q 840,1720 840,1920"/>
    <path d="M 300,1920 Q 300,1760 540,1760 Q 780,1760 780,1920"/>
  </g>

  <!-- White and gold particles -->
  <g fill="white">
    <circle cx="150" cy="200" r="1.5" opacity="0.4"/>
    <circle cx="930" cy="180" r="1.5" opacity="0.4"/>
    <circle cx="100" cy="600" r="1" opacity="0.3"/>
    <circle cx="980" cy="550" r="1" opacity="0.3"/>
    <circle cx="200" cy="1400" r="1.5" opacity="0.25"/>
    <circle cx="880" cy="1500" r="1.5" opacity="0.25"/>
    <circle cx="350" cy="1750" r="1" opacity="0.2"/>
    <circle cx="730" cy="1800" r="1" opacity="0.2"/>
  </g>
  <g fill="#C9A96E">
    <circle cx="300" cy="400" r="2" opacity="0.35"/>
    <circle cx="780" cy="350" r="2" opacity="0.35"/>
    <circle cx="150" cy="900" r="1.5" opacity="0.3"/>
    <circle cx="930" cy="950" r="1.5" opacity="0.3"/>
    <circle cx="400" cy="1600" r="2" opacity="0.25"/>
    <circle cx="700" cy="1650" r="2" opacity="0.25"/>
  </g>

  <defs>
    <linearGradient id="whiteline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="3" fill="url(#whiteline)"/>
  <rect x="0" y="1917" width="1080" height="3" fill="url(#whiteline)"/>
</svg>
